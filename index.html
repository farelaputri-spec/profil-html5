<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Siswa</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    padding:20px;
    background:linear-gradient(-45deg,#fff0f6,#ffe4ef,#ffd6e8,#ffcce5);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* bunga */
.flower{
    position:absolute;
    font-size:35px;
    opacity:0.8;
    animation:float 6s ease-in-out infinite;
}

.flower:nth-child(1){top:5%;left:8%;}
.flower:nth-child(2){top:10%;right:10%;}
.flower:nth-child(3){bottom:10%;left:10%;}
.flower:nth-child(4){bottom:8%;right:8%;}
.flower:nth-child(5){top:45%;left:3%;}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

header{
    text-align:center;
    margin-bottom:25px;
}

header h1{
    color:#ff69b4;
    font-size:38px;
    text-transform:uppercase;
    letter-spacing:2px;
    text-shadow:
    0 0 10px #fff,
    0 0 20px #ffd6e8,
    0 0 30px #ffb6d9;
}

header p{
    color:#d85a9f;
}

.card{
    width:380px;
    padding:30px;
    border-radius:25px;
    text-align:center;

    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(15px);

    border:2px solid rgba(255,255,255,0.7);

    box-shadow:
    0 0 15px rgba(255,182,217,0.7),
    0 0 35px rgba(255,192,203,0.6);
}

.profile-img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

.card h2{
    color:#ff5ca8;
    margin-bottom:10px;
    font-size:30px;
}

.desc{
    color:#8d4c6f;
    line-height:1.8;
}

.quote{
    margin-top:20px;
    font-style:italic;
    color:#c25d91;
}

.social{
    margin-top:25px;
}

.social a{
    color:#ff69b4;
    text-decoration:none;
    font-size:28px;
    margin:0 12px;
    transition:.3s;
}

.social a:hover{
    transform:scale(1.2);
    color:#ff3f9b;
}
</style>
</head>

<body>

<div class="flower">🌷</div>
<div class="flower">🌷</div>
<div class="flower">🌷</div>
<div class="flower">🌷</div>
<div class="flower">🌷</div>

<header>
    <h1>🌷 Profile Diri Siswa 🌷</h1>
    <p>✨ Kreatif • Modern • Informatika ✨</p>
</header>

<div class="card">

    <img src="IMG_5700.jpeg" alt="Foto Profil" class="profile-img">

    <h2>Farela Putri Yulianto</h2>

    <div class="desc">
        <p><b>Kelas:</b> X-A</p>
        <p><b>Sekolah:</b> SMKS Kesehatan Yannas Husada Bangkalan</p>
        <p><b>Hobi:</b> Travelling</p>
    </div>

    <div class="quote">
        "Jangan menghitung hari, buatlah hari-hari itu berarti."
    </div>

    <div class="social">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
    </div>

</div>

</body>
</html>
